# Test profile: use PostgreSQL instance for tests (defaults can be overridden via env vars)
# Example env vars you can set in your shell or CI:
#   TEST_DB_URL, TEST_DB_USER, TEST_DB_PASSWORD
spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://localhost:5432/demo_app}
spring.datasource.username=${TEST_DB_USER:postgres}
spring.datasource.password=${TEST_DB_PASSWORD:postgres}
# Force the PostgreSQL JDBC driver to avoid H2 claiming the URL
spring.datasource.driver-class-name=org.postgresql.Driver
# Enable Flyway during tests so migrations run against the same DB as production
spring.flyway.enabled=true
# Ensure Hibernate doesn't auto-alter schema in tests
spring.jpa.hibernate.ddl-auto=none
# Keep Flyway migrations on default location
spring.flyway.locations=classpath:db/migration
